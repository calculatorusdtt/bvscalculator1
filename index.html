<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Калькулятор USDT</title>
<style>
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #0a0a0a;
  color: #e0e0e0;
  margin: 0;
  padding: 40px 20px;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.container {
  max-width: 480px;
  width: 100%;
  background: #111111;
  border-radius: 16px;
  padding: 40px 30px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  border: 1px solid #333;
}
h1 {
  text-align: center;
  margin-bottom: 30px;
  font-size: 28px;
  color: #ffffff;
}
input {
  width: 100%;
  padding: 16px;
  margin: 12px 0;
  background: #1f1f1f;
  border: 1px solid #444;
  border-radius: 8px;
  color: white;
  font-size: 18px;
}
button {
  width: 100%;
  padding: 16px;
  margin-top: 10px;
  background: #6200ee;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 18px;
  font-weight: 600;
  cursor: pointer;
}
button:hover {
  background: #7c3aed;
}
.result {
  margin-top: 25px;
  padding: 20px;
  background: #1a1a1a;
  border-radius: 10px;
  font-size: 20px;
  line-height: 1.6;
  min-height: 80px;
}
</style>
</head>
<body>
<div class="container">
  <h1>Калькулятор USDT</h1>
  
  <input type="number" id="amount" placeholder="Сумма в USDT" step="0.01">
  <input type="number" id="percent" placeholder="Процент за работу" step="0.01">
  
  <button onclick="calculate()">Рассчитать</button>
  
  <div id="result" class="result"></div>
</div>

<script>
function calculate() {
  let amount = parseFloat(document.getElementById('amount').value);
  let percent = parseFloat(document.getElementById('percent').value);
  
  if (isNaN(amount) || isNaN(percent)) {
    document.getElementById('result').innerHTML = "Введите корректные числа";
    return;
  }
  
  let fee = amount * (percent / 100);
  let total = amount + fee;
  
  document.getElementById('result').innerHTML = `
    Сумма: ${amount} USDT<br>
    Процент: ${percent}%<br>
    Комиссия: ${fee.toFixed(2)} USDT<br>
    <strong>Итого: ${total.toFixed(2)} USDT</strong>
  `;
}
</script>
</body>
</html>
