<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>USDT Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Inter:wght@400;600&display=swap');

body {
  font-family: 'Inter', sans-serif;
  background: #0a0a0f;
  color: #0f0;
  margin: 0;
  padding: 20px;
}
.container {
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  gap: 15px;
}
.card {
  flex: 1;
  background: #111118;
  border: 1px solid #00ff41;
  border-radius: 8px;
  padding: 20px;
  box-shadow: 0 0 15px rgba(0,255,65,0.15);
}
h2 {
  margin: 0 0 15px 0;
  color: #00ff41;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 1px;
}
.value {
  font-family: 'Roboto Mono', monospace;
  font-size: 32px;
  font-weight: 700;
  color: #00ff88;
}
input {
  width: 100%;
  padding: 14px;
  background: #1a1a22;
  border: 1px solid #00ff41;
  border-radius: 6px;
  color: #0f0;
  font-size: 18px;
}
button {
  width: 100%;
  padding: 14px;
  background: #00ff41;
  color: black;
  border: none;
  border-radius: 6px;
  font-weight: 600;
  margin-top: 10px;
}
.record {
  background: #1a1a22;
  padding: 12px;
  margin: 8px 0;
  border-radius: 6px;
  border-left: 4px solid #00ff41;
  font-size: 14px;
}
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <h2>Калькулятор</h2>
    <input type="number" id="amount" placeholder="Сумма USDT" step="0.01">
    <input type="number" id="percent" placeholder="Процент" step="0.01">
    <button onclick="calculate()">РАССЧИТАТЬ</button>
  </div>
  
  <div class="card">
    <h2>Сегодня</h2>
    <div id="today" class="value">0 USDT</div>
  </div>
  
  <div class="card">
    <h2>Общая</h2>
    <div id="total" class="value">0 USDT</div>
  </div>
  
  <div class="card">
    <h2>История</h2>
    <div id="history"></div>
  </div>
</div>

<script>
let records = JSON.parse(localStorage.getItem('usdt_records') || '[]');

function calculate() {
  let amount = parseFloat(document.getElementById('amount').value);
  let percent = parseFloat(document.getElementById('percent').value);
  if (isNaN(amount) || isNaN(percent)) return;

  let fee = amount * (percent / 100);
  let total = amount + fee;
  let date = new Date().toLocaleString('ru-RU');

  records.unshift({date, amount, percent, total});
  localStorage.setItem('usdt_records', JSON.stringify(records));
  
  render();
}

function render() {
  let today = 0;
  let all = 0;
  let html = '';

  records.forEach(r => {
    html += `<div class="record">${r.date} — ${r.amount} USDT (${r.percent}%) = ${r.total}</div>`;
    all += r.amount;
    if (r.date.includes(new Date().toLocaleDateString('ru-RU'))) today += r.amount;
  });

  document.getElementById('today').textContent = today.toFixed(2) + ' USDT';
  document.getElementById('total').textContent = all.toFixed(2) + ' USDT';
  document.getElementById('history').innerHTML = html;
}

render();
</script>
</body>
</html>
