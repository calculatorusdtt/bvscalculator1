<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Калькулятор USDT</title>
<style>
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #0f0f0f;
  color: #ddd;
  margin: 0;
  padding: 40px 20px;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.calculator {
  display: flex;
  max-width: 800px;
  width: 100%;
  background: #1a1a1a;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}
.left {
  flex: 1;
  padding: 40px;
  background: #111;
}
.right {
  flex: 1;
  padding: 40px;
  background: #222;
}
h1 {
  margin: 0 0 30px 0;
  font-size: 26px;
}
input {
  width: 100%;
  padding: 16px;
  margin: 12px 0;
  background: #2a2a2a;
  border: none;
  border-radius: 8px;
  color: white;
  font-size: 18px;
}
button {
  width: 100%;
  padding: 16px;
  background: #6200ee;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 18px;
  margin-top: 10px;
}
.result-line {
  margin: 15px 0;
  font-size: 18px;
}
.result-line strong {
  color: #bb86fc;
}
</style>
</head>
<body>
<div class="calculator">
  <div class="left">
    <h1>Калькулятор USDT</h1>
    <input type="number" id="amount" placeholder="Сумма в USDT" step="0.01">
    <input type="number" id="percent" placeholder="Процент за работу" step="0.01">
    <button onclick="calculate()">Рассчитать</button>
  </div>
  
  <div class="right">
    <h1>Результат</h1>
    <div id="result"></div>
  </div>
</div>

<script>
function calculate() {
  let amount = parseFloat(document.getElementById('amount').value);
  let percent = parseFloat(document.getElementById('percent').value);
  
  if (isNaN(amount) || isNaN(percent)) {
    document.getElementById('result').innerHTML = "<p>Введите корректные числа</p>";
    return;
  }
  
  let fee = amount * (percent / 100);
  let total = amount + fee;
  let net = amount - fee;
  
  document.getElementById('result').innerHTML = `
    <div class="result-line">Сумма: <strong>${amount} USDT</strong></div>
    <div class="result-line">Процент: <strong>${percent}%</strong></div>
    <div class="result-line">Комиссия: <strong>${fee.toFixed(2)} USDT</strong></div>
    <hr>
    <div class="result-line">Итого к оплате: <strong>${total.toFixed(2)} USDT</strong></div>
    <div class="result-line">Сумма после вычета: <strong>${net.toFixed(2)} USDT</strong></div>
  `;
}
</script>
</body>
</html>
