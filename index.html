<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>USDT Dashboard</title>
<style>
body {
  font-family: 'Segoe UI', monospace;
  background: #0a0a0f;
  color: #0f0;
  margin: 0;
  padding: 20px;
}
.dashboard {
  max-width: 1200px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 15px;
}
.card {
  background: #111118;
  border: 1px solid #00ff41;
  border-radius: 8px;
  padding: 20px;
  box-shadow: 0 0 15px rgba(0,255,65,0.2);
}
h2 {
  margin: 0 0 15px 0;
  color: #00ff41;
  font-size: 18px;
}
.value {
  font-size: 28px;
  font-weight: bold;
}
.time {
  position: fixed;
  top: 20px;
  right: 20px;
  background: #111;
  padding: 8px 16px;
  border: 1px solid #00ff41;
  border-radius: 6px;
  font-size: 16px;
}
</style>
</head>
<body>
<div class="time" id="time"></div>

<div class="dashboard">
  <div class="card">
    <h2>Сегодня</h2>
    <div id="today" class="value">0 USDT</div>
  </div>
  
  <div class="card">
    <h2>Столбец 2</h2>
    <div class="value">-</div>
  </div>
  
  <div class="card">
    <h2>Столбец 3</h2>
    <div class="value">-</div>
  </div>
  
  <div class="card">
    <h2>Общая статистика</h2>
    <div id="total" class="value">0 USDT</div>
  </div>
</div>

<script>
// Пример данных (замени на свою логику)
let todayTotal = 12450;
let allTotal = 89340;

document.getElementById('today').textContent = todayTotal + ' USDT';
document.getElementById('total').textContent = allTotal + ' USDT';

// Таймер
function updateTime() {
  const now = new Date();
  document.getElementById('time').textContent = now.toLocaleTimeString('ru-RU');
}
setInterval(updateTime, 1000);
updateTime();
</script>
</body>
</html>
