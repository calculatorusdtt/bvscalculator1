<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>USDT Калькулятор</title>
<style>
body {
  font-family: 'Segoe UI', Arial;
  background: #0a0a0f;
  color: #ddd;
  margin: 0;
  padding: 20px;
}
.container {
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  gap: 20px;
}
.left {
  flex: 1;
  background: #111;
  border: 2px solid #ff00ff;
  border-radius: 16px;
  padding: 30px;
}
.right {
  flex: 1;
  background: #111;
  border: 2px solid #ff00ff;
  border-radius: 16px;
  padding: 30px;
  overflow-y: auto;
  max-height: 90vh;
}
input, button {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 8px;
}
button {
  background: #ff00ff;
  color: black;
  border: none;
}
.record {
  background: #1a1a1a;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
}
.delete-btn {
  background: #ff4444;
  padding: 4px 10px;
  font-size: 12px;
}
</style>
</head>
<body>
<div class="container">
  <div class="left">
    <h1>Калькулятор USDT</h1>
    <input type="number" id="amount" placeholder="Сумма в USDT" step="0.01">
    <input type="number" id="percent" placeholder="Процент за работу" step="0.01">
    <button onclick="calculate()">Рассчитать</button>
  </div>
  
  <div class="right">
    <h1>История расчётов</h1>
    <div id="history"></div>
  </div>
</div>

<script>
let records = JSON.parse(localStorage.getItem('usdt_records') || '[]');

function calculate() {
  let amount = parseFloat(document.getElementById('amount').value);
  let percent = parseFloat(document.getElementById('percent').value);
  
  if (isNaN(amount) || isNaN(percent)) return;

  let fee = amount * (percent / 100);
  let total = amount + fee;
  let date = new Date().toLocaleString('ru-RU');

  let record = {date, amount, percent, fee, total};
  records.unshift(record);
  localStorage.setItem('usdt_records', JSON.stringify(records));
  
  renderHistory();
}

function renderHistory() {
  let html = '';
  records.forEach((r, index) => {
    html += `
      <div class="record">
        <div>
          ${r.date}<br>
          ${r.amount} USDT → ${r.total.toFixed(2)} USDT (${r.percent}%)
        </div>
        <button class="delete-btn" onclick="deleteRecord(${index})">Удалить</button>
      </div>
    `;
  });
  document.getElementById('history').innerHTML = html;
}

function deleteRecord(index) {
  records.splice(index, 1);
  localStorage.setItem('usdt_records', JSON.stringify(records));
  renderHistory();
}

renderHistory();
</script>
</body>
</html>
